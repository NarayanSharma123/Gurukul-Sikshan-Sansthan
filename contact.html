<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact - GSS School</title>

    <link rel="stylesheet" href="css/common.css" />
    <link rel="stylesheet" href="css/contact.css" />

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
  </head>
  <body>
    <!-- NAVBAR -->

    <nav id="navbar"></nav>

    <!-- HERO -->

    <section class="contact-hero">
      <div class="overlay">
        <h1>Contact Us</h1>

        <p>We are here to help and answer your questions.</p>
      </div>
    </section>

    <!-- CONTACT INFO -->

    <section class="container">
      <h2 class="section-title">Get In Touch</h2>

      <div class="contact-grid">
        <div class="contact-card">
          <i class="fas fa-map-marker-alt"></i>
          <h3>Address</h3>
          <p>Your School Address Here</p>
        </div>

        <div class="contact-card">
          <i class="fas fa-phone"></i>
          <h3>Call Us</h3>
          <a href="tel:+919828407691"> +91 98284 07691 </a>
        </div>

        <div class="contact-card">
          <i class="fab fa-whatsapp"></i>
          <h3>WhatsApp</h3>
          <a href="https://wa.me/919828407691"> Chat On WhatsApp </a>
        </div>

        <div class="contact-card">
          <i class="fas fa-envelope"></i>
          <h3>Email</h3>
          <a href="mailto:school@example.com"> school@example.com </a>
        </div>
      </div>
    </section>

    <!-- MAP -->

    <section class="container">
      <h2 class="section-title">School Location</h2>

      <div class="map-container">
        <iframe
          src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d56560.06460687677!2d74.36053480930484!3d27.62439159628479!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x396b2fdee3e6b37d%3A0xdea628926921a751!2z4KSX4KWB4KSw4KWC4KSV4KWB4KSyIOCktuCkv-CkleCljeCkt-CkoyDgpLjgpILgpLjgpY3gpKXgpL7gpKgg4KS14KS_4KSn4KS-4KSy4KSvIOCkruCkl-CksuCkquClgeCksOCkvg!5e0!3m2!1sen!2sin!4v1781432661734!5m2!1sen!2sin"
          width="100%"
          height="450"
          style="border: 0"
          allowfullscreen=""
          loading="lazy"
          referrerpolicy="no-referrer-when-downgrade"
        >
        </iframe>
      </div>
    </section>

    <!-- SOCIAL -->

    <section class="container">
      <h2 class="section-title">Follow Us</h2>

      <div class="social-grid">
        <a
          href="https://www.instagram.com/"
          target="_blank"
          class="social-card"
        >
          <i class="fab fa-instagram"></i>
          Instagram
        </a>

        <a href="https://www.facebook.com/" target="_blank" class="social-card">
          <i class="fab fa-facebook"></i>
          Facebook
        </a>

        <a href="https://www.youtube.com/" target="_blank" class="social-card">
          <i class="fab fa-youtube"></i>
          YouTube
        </a>
      </div>
    </section>

    <!-- FLOAT BUTTONS -->

    <a href="tel:+919828407691" class="call-btn">
      <i class="fas fa-phone"></i>
    </a>

    <a href="https://wa.me/919828407691" class="whatsapp">
      <i class="fab fa-whatsapp"></i>
    </a>

    <button class="scroll-top">↑</button>

    <!-- FOOTER -->

    <div id="footer"></div>

    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
